# Hacknet x Hyprlust lock screen.

background {
    monitor =
    path = ~/.config/hypr/assets/lockscreen.jpg

    blur_passes = 3
    blur_size = 8

    noise = 0.0117
    contrast = 0.95
    brightness = 0.65
    vibrancy = 0.08
    vibrancy_darkness = 0.2
}

input-field {
    monitor =
    size = 300, 44
    outline_thickness = 1

    outer_color = rgba(7fb6c9aa)
    inner_color = rgba(020812dd)
    font_color = rgb(e6f7ff)

    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1

    fade_on_empty = false
    placeholder_text = <span foreground="##8faab5">Password</span>
    hide_input = false

    rounding = 4
    check_color = rgba(8bbf9faa)
    fail_color = rgba(a56b73aa)
    fail_text = $FAIL
    fail_transition = 180

    position = 0, -22
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgb(e6f7ff)
    font_size = 44
    font_family = JetBrainsMono Nerd Font
    position = 0, 72
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(000000cc)
}

label {
    monitor =
    text = cmd[update:60000] date +"%Y-%m-%d"
    color = rgb(a9c2cc)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, 32
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(000000cc)
}

label {
    monitor =
    text = $USER
    color = rgb(9eeaff)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -82
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(000000cc)
}
