# Hacknet x Hyprlust-inspired constants.

$term = kitty
$file_manager = kitty -e yazi
$launcher = rofi -show drun
$browser = flatpak run app.zen_browser.zen
$assistant = kitty -e codex
$screenshot_tool = ~/.config/hypr/scripts/hacknet-screenshot.sh
$screenshot = grim -g "$(slurp)" "$HOME/Pictures/Screenshots/$(date +'%Y%m%d-%H%M%S').png"

$bg = rgb(060d14)
$bg_alt = rgb(0a141f)
$panel = rgb(0e1b29)
$cyan = rgb(7fb6c9)
$cyan_dim = rgb(4d7f91)
$blue = rgb(355d78)
$blue_dim = rgb(172836)
$green = rgb(8bbf9f)
$green_dim = rgb(557e69)
$text = rgb(b9cbd2)
$muted = rgb(708996)
$warn = rgb(b8a36f)
