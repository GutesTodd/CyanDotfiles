$mainMod = SUPER

bind = $mainMod, Return, exec, $term
bind = $mainMod, D, exec, $launcher
bind = $mainMod, B, exec, $browser
bind = $mainMod, A, exec, $assistant
bind = $mainMod, E, exec, $file_manager
bind = $mainMod, F, exec, $file_manager
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, T, togglefloating
bind = $mainMod, M, fullscreen, 1

bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod, 1, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/switch-workspace-group.sh 9

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 9
bind = $mainMod SHIFT, code:10, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 1
bind = $mainMod SHIFT, code:11, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 2
bind = $mainMod SHIFT, code:12, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 3
bind = $mainMod SHIFT, code:13, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 4
bind = $mainMod SHIFT, code:14, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 5
bind = $mainMod SHIFT, code:15, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 6
bind = $mainMod SHIFT, code:16, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 7
bind = $mainMod SHIFT, code:17, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 8
bind = $mainMod SHIFT, code:18, exec, ~/.config/hypr/scripts/move-to-workspace-group.sh 9

bind = , Print, exec, $screenshot_tool
bind = $mainMod, V, exec, sh -lc 'command -v cliphist >/dev/null && cliphist list | rofi -dmenu -p clip | cliphist decode | wl-copy'
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/hacknet-startup.sh
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/open-network-workspace.sh

binde = , F1, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , F2, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binde = , F3, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , F4, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = , F5, exec, hyprctl reload
bind = , F9, exec, hyprlock
binde = , F11, exec, brightnessctl set 5%-
binde = , F12, exec, brightnessctl set 5%+

binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
