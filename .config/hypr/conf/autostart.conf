exec-once = sh -lc 'command -v cliphist >/dev/null && command -v wl-paste >/dev/null && wl-paste --watch cliphist store'
exec-once = sh -lc 'command -v /usr/libexec/polkit-gnome-authentication-agent-1 >/dev/null && /usr/libexec/polkit-gnome-authentication-agent-1'
exec-once = sh -lc 'command -v hyprpaper >/dev/null && [ -s "$HOME/.config/hypr/hyprpaper.conf" ] && hyprpaper -c "$HOME/.config/hypr/hyprpaper.conf"'
